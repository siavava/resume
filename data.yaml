experience:
  - role: Software Engineer
    org: Meta / Facebook
    location: Menlo Park, California
    location-short: Menlo Park, CA
    dates: Since August 2024
    period: 2024 — Present
    summary: |
      On the _Messaging and Instagram API & Platform_ team (twelve engineers),
      building and maintaining Meta's
      #tlink("https://developers.facebook.com/docs/messenger-platform/")[Messaging APIs]
      — Meta's primary channel for monetizing social-media messaging, with an
      estimated revenue impact of over \$15M daily in 2025. My work includes:
    responsibilities:
      - |
        Building and maintaining the client-side experiences (iOS and Web) for
        API-messaging features on Messenger and Instagram.
      - |
        Designing and shipping new platform APIs for third-party developers such
        as #tlink("https://manychat.com/")[ManyChat] and
        #tlink("https://pancake.biz/")[Pancake] — including the
        #tlink("https://developers.facebook.com/docs/messenger-platform/send-messages/utility-messages/")[*Utility Messages API*],
        a new class of messages for notifications like appointment reminders and
        shipping updates, and the
        #tlink("https://developers.facebook.com/documentation/business-messaging/messenger-platform/calling")[*Calling API*],
        which brings voice and video calling into third-party messaging
        experiences. Others include the
        #tlink("https://developers.facebook.com/docs/pages-api/integrity-webhook")[*Page Integrity API*],
        #tlink("https://developers.facebook.com/documentation/business-messaging/messenger-platform/discovery/lead-generation-ads-in-messenger")[*Lead Generation Ads*],
        #tlink("https://developers.facebook.com/documentation/business-messaging/messenger-platform/send-messages/template/generic")[*Generic Template*],
        and a *messaging media-processing pipeline*, among others.
      - |
        Partnering with cross-functional teams (product, design, data science
        and data engineering) to deliver features, read usage trends, and drive
        adoption.
      - Mentoring a summer intern and a new member of the team.
      - |
        Carrying 24/7 platform ownership one week every ∼3 months through the
        team's immediate-response oncall (`IROC`) rotation.
    technologies: C++, Hack/PHP, Swift, Objective-C, JavaScript, Python
  - role: Software Engineering Intern
    org: Meta / Facebook
    location: Menlo Park, California
    location-short: Menlo Park, CA
    dates: June – September 2022
    period: Summer 2022
    summary: |
      Worked on the _Ads Serving Reliability_ team to harden Meta's machine
      learning data pipelines for understanding user signal on ads, as Meta
      adapted its ML strategy to the limited data left after Apple's iOS 14.5
      cross-app-tracking restrictions. I:
    responsibilities:
      - |
        prototyped a closed-loop ML pipeline connecting Meta's internal data
        stores to training and inference workflows and back to the apps as
        feedback;
      - |
        built a command-line utility for monitoring and controlling data
        throughput, letting ML engineers tune data rates to the scale of
        experimentation.
    technologies: C++, Hack/PHP, Python, SQL

